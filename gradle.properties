# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
kotlin.code.style=official
android.disallowKotlinSourceSets=false

# AAPT2 Windows Stability Fixes
android.aapt2.daemon.max=0
android.enableAapt2Daemon=false
android.aapt2FromMaven=true

# AndroidX support
android.useAndroidX=true
android.enableJetifier=true

# Reset Gradle state and avoid locks on Windows
org.gradle.daemon=false
org.gradle.vfs.watch=false
kotlin.compiler.execution.strategy=in-process
org.gradle.caching=false

# Optimize R class generation to avoid locks on R.jar
android.nonTransitiveRClass=true
